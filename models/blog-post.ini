[model]
name = Blog Post
label = {{ this.title }}
hidden = yes

[fields.title]
label = Title
type = string
size = large

[fields.pub_date]
label = Publication date
type = date
width = 1/2

[fields.author]
label = Author
type = string
width = 1/2

[fields.last_updated]
label = Last updated
type = date
width = 1/2

[fields.event_date]
label = Event date
type = date
width = 1/2

[fields.summary]
label = Summary
type = text

[fields.body]
label = Body
type = markdown